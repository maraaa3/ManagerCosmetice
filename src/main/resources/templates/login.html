<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Manager Cosmetice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-lg p-4" style="width: 400px;">
        <div class="text-center mb-4">
            <h2 class="text-primary">💄 Login</h2>
            <p class="text-muted">Manager Cosmetice</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger text-center">
            Utilizator sau parolă incorectă!
        </div>

        <div th:if="${param.logout}" class="alert alert-success text-center">
            Te-ai delogat cu succes.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Utilizator</label>
                <input type="text" name="username" class="form-control" placeholder="Introdu userul..." required autofocus>
            </div>

            <div class="form-group">
                <label>Parolă</label>
                <input type="password" name="password" class="form-control" placeholder="Introdu parola..." required>
            </div>

            <button type="submit" class="btn btn-primary btn-block font-weight-bold">Intră în cont</button>
        </form>

        <div class="text-center mt-3 text-muted">
            <small>User: admin | Parola: admin</small>
        </div>
    </div>
</div>

</body>
</html>
