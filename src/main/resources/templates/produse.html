<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manager Cosmetice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="text-center mb-4">
    <h2>Stoc Produse Cosmetice <div class="text-right">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-danger"> Logout</button>
        </form>
    </div></h2>
    <p class="text-muted">Gestionează inventarul tău simplu și rapid</p>
</div>

<div class="card p-3 mb-4 bg-light shadow-sm">
    <form action="/produse" method="get" class="form-row align-items-center justify-content-center">

        <div class="col-auto">
            <input type="text" name="brand" th:value="${brandSelectat}"
                   class="form-control" placeholder="Caută Brand...">
        </div>

        <div class="col-auto">
            <input type="text" name="categorie" th:value="${categorieSelectata}"
                   class="form-control" placeholder="Caută Categorie...">
        </div>

        <div class="col-auto">
            <input type="text" name="tip" th:value="${tipSelectat}"
                   class="form-control" placeholder="Caută Tip...">
        </div>

        <div class="col-auto">
            <button type="submit" class="btn btn-primary"> Filtrează</button>
            <a href="/produse" class="btn btn-outline-secondary">Resetează</a>
        </div>
    </form>
</div>

<div class="d-flex justify-content-between mb-3">
    <span class="h5 align-self-center text-info">Lista curentă:</span>
    <a href="/produse/nou" class="btn btn-success font-weight-bold shadow-sm">
        + Adaugă Produs Nou
    </a>
</div>

<div class="table-responsive">
    <table class="table table-bordered table-hover">
        <thead class="thead-dark">
        <tr>
            <th>Nume Produs</th>
            <th>Brand</th>
            <th>Categorie</th>
            <th>Tip / Detalii</th>
            <th>Expiră la</th>
            <th>Preț</th>
            <th>Stoc</th>
            <th style="width: 180px;">Acțiuni</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="produs : ${listaProduse}">

            <td th:text="${produs.numeProdus}" class="font-weight-bold"></td>
            <td th:text="${produs.brand}"></td>

            <td>
                <span class="badge badge-light" style="font-size: 0.9em" th:text="${produs.categorie}"></span>
            </td>

            <td th:text="${produs.tipProdus}"></td>

            <td th:text="${produs.dataExpirare != null} ? ${#temporals.format(produs.dataExpirare, 'dd-MM-yyyy')} : 'Nespecificat'"></td>
            <td th:text="${produs.pret} + ' RON'"></td>

            <td th:switch="${produs.stoc < 5}">
                <span th:case="true" class="text-danger font-weight-bold" th:text="${produs.stoc} + ' (Limitat!)'"></span>
                <span th:case="false" class="text-success" th:text="${produs.stoc}"></span>
            </td>

            <td>
                <a th:href="@{/produse/editeaza/{id}(id=${produs.id})}" class="btn btn-sm btn-info">
                    Edit
                </a>

                <a th:href="@{/produse/sterge/{id}(id=${produs.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Ești sigur că vrei să ștergi acest produs din stoc?');">
                    Sterge
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:if="${listaProduse.empty}" class="alert alert-warning text-center mt-4">
    <h4>Nu am găsit niciun produs! </h4>
    <p>Încearcă să schimbi filtrele sau adaugă produse noi în stoc.</p>
</div>

</body>
</html>
