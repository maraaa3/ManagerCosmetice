<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Manager Cosmetice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #fff0f6; /* fundal roz */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2); /* Umbra */
        }
        .text-pink {
            color: #d63384;
        }
        /* Buton roz */
        .btn-pink {
            background-color: #ff69b4;
            border-color: #ff69b4;
            color: white;
            border-radius: 20px;
        }
        .btn-pink:hover {
            background-color: #e05297;
            color: white;
        }
        /* Capul de tabel */
        .thead-pink {
            background-color: #ffc0cb;
            color: #880e4f;
        }
        .badge-pink {
            background-color: #ffe4e1;
            color: #d63384;
        }
    </style>
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="text-pink font-weight-bold">🌸 Stoc Cosmetice </h2>
        <p class="text-muted">
            Bună, <span sec:authentication="principal.nume" class="font-weight-bold text-pink">User</span>!
            <span class="badge badge-info" sec:authorize="hasRole('ROLE_EDITOR')">EDITOR</span>
            <span class="badge badge-secondary" sec:authorize="hasRole('ROLE_USER')">VISITOR</span>
        </p>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-danger" style="border-radius: 20px;"> Ieșire</button>
    </form>
</div>

<div class="card p-4 mb-4 bg-white">
    <form action="/produse" method="get" class="form-row align-items-center justify-content-center">
        <div class="col-auto">
            <input type="text" name="brand" th:value="${brandSelectat}" class="form-control"
                   placeholder="Caută Brand... ">
        </div>
        <div class="col-auto">
            <input type="text" name="categorie" th:value="${categorieSelectata}" class="form-control"
                   placeholder="Caută Categorie... ">
        </div>
        <div class="col-auto">
            <input type="text" name="tip" th:value="${tipSelectat}" class="form-control" placeholder="Caută Tip... ">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-pink px-4"> Caută</button>
            <a href="/produse" class="btn btn-link text-pink">Resetează</a>
        </div>
    </form>
</div>

<div class="d-flex justify-content-between mb-3" sec:authorize="hasRole('ROLE_EDITOR')">
    <span class="h5 align-self-center text-pink">Produsele Tale:</span>
    <a href="/produse/nou" class="btn btn-success font-weight-bold shadow-sm" style="border-radius: 20px;">
        + Adaugă Produs Nou
    </a>
</div>

<div class="table-responsive card p-0 overflow-hidden">
    <table class="table table-hover mb-0">
        <thead class="thead-pink">
        <tr>
            <th>Nume Produs</th>
            <th>Brand</th>
            <th>Categorie</th>
            <th>Detalii</th>
            <th>Expiră la</th>
            <th>Preț</th>
            <th>Stoc</th>
            <th style="width: 180px;" sec:authorize="hasRole('ROLE_EDITOR')">Acțiuni</th>
        </tr>
        </thead>
        <tbody class="bg-white">
        <tr th:each="produs : ${listaProduse}">
            <td th:text="${produs.numeProdus}" class="font-weight-bold text-dark"></td>
            <td th:text="${produs.brand}"></td>
            <td><span class="badge badge-pink p-2" th:text="${produs.categorie}"></span></td>
            <td th:text="${produs.tipProdus}"></td>

            <td th:text="${produs.dataExpirare != null} ? ${#temporals.format(produs.dataExpirare, 'dd-MM-yyyy')} : 'Nespecificat'"></td>

            <td th:text="${produs.pret} + ' RON'" class="font-weight-bold text-pink"></td>

            <td th:switch="${produs.stoc < 5}">
                <span th:case="true" class="text-danger font-weight-bold" th:text="${produs.stoc} + ' (!)'"></span>
                <span th:case="false" class="text-success" th:text="${produs.stoc}"></span>
            </td>

            <td sec:authorize="hasRole('ROLE_EDITOR')">
                <a th:href="@{/produse/editeaza/{id}(id=${produs.id})}" class="btn btn-sm btn-info rounded-pill">✏️</a>
                <a th:href="@{/produse/sterge/{id}(id=${produs.id})}" class="btn btn-sm btn-danger rounded-pill ml-1"
                   onclick="return confirm('Sigur vrei să ștergi?')">🗑</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:if="${listaProduse.empty}" class="alert alert-light text-center mt-4 border-pink">
    <h4 class="text-pink">Nu am găsit produse! </h4>
</div>

</body>
</html>
